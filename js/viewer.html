<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview Window</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#080808;overflow:hidden;cursor:grab}
body.panning{cursor:grabbing}
#wrap{
    width:100%;height:100%;position:relative;overflow:hidden;
    background-color:#050505;
    background-image:
        linear-gradient(45deg, #101010 25%, transparent 25%),
        linear-gradient(-45deg, #101010 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #101010 75%),
        linear-gradient(-45deg, transparent 75%, #101010 75%);
    background-size:20px 20px;
    background-position:0 0, 0 10px, 10px -10px, -10px 0px;
}
#img{
    position:absolute;top:0;left:0;
    display:block;transform-origin:0 0;
    transition:opacity 0.15s;
    user-select:none;-webkit-user-drag:none;
}
#bar{
    position:fixed;bottom:18px;right:18px;
    display:flex;flex-direction:column;align-items:flex-end;gap:6px;
    opacity:0;transition:opacity 0.25s;
}
#bar .row{display:flex;gap:8px;}
body:hover #bar{opacity:1}
#bar button{
    background:rgba(28,28,28,0.92);
    border:1px solid rgba(255,255,255,0.12);
    color:#ccc;padding:6px 15px;
    border-radius:6px;cursor:pointer;
    font-size:13px;backdrop-filter:blur(6px);
    transition:background 0.14s,color 0.14s;
}
#bar button:hover{background:rgba(72,72,72,0.96);color:#fff}
#bar button.active{background:rgba(46,58,46,0.95);color:#7dc97d}
#bar button.dim{opacity:0.35;pointer-events:none}
#bar .mode-group{display:flex;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,0.12);background:rgba(18,18,18,0.6)}
#bar .mode-group button{border:none;border-radius:0;border-right:1px solid rgba(255,255,255,0.12);margin:0;background:transparent}
#bar .mode-group button:last-child{border-right:none}
#bar .mode-group button.active{background:rgba(46,58,46,0.95);color:#7dc97d}
#dims{
    position:fixed;bottom:20px;left:16px;
    font:11px monospace;color:rgba(255,255,255,0.22);
    pointer-events:none;
}
#info-panel{
    position:absolute;top:10px;left:10px;
    background:rgba(8,8,8,0.84);
    border:1px solid rgba(255,255,255,0.09);
    border-radius:5px;padding:7px 11px;
    font:11px/1.8 monospace;color:#888;
    pointer-events:none;backdrop-filter:blur(6px);
    display:none;z-index:2;
}
#info-panel.visible{display:block}
</style>
</head>
<body>
<div id="wrap">
  <img id="img" alt="" draggable="false">
  <div id="info-panel"><div id="ip-dims">—</div><div id="ip-zoom">Zoom: 100%</div><div id="ip-format">Format: RGB</div></div>
</div>
<div id="dims"></div>
<div id="bar">
  <div class="row">
    <span class="mode-group">
      <button id="btn-mode-image" class="active">Image</button>
      <button id="btn-mode-mask">Mask</button>
      <button id="btn-mode-overlay">Overlay</button>
    </span>
  </div>
  <div class="row">
    <button id="btn-info">&#x2139; Info</button>
    <button id="btn-fit-zoom" title="Fit image to window (0)">&#x26F6; Fit Image</button>
    <button id="btn-100" title="Actual Size / Real Pixels (1)">1:1 Pixel</button>
    <button id="btn-adjust" title="Fit window to current zoom level">&#x2921; Fit Window</button>
    <button id="btn-close">&#x2715; Close</button>
  </div>
</div>
<script>
(function () {
    const params    = new URLSearchParams(location.search);
    const initTitle = params.get("title") || "Preview Window";
    document.title  = initTitle;

    const img     = document.getElementById("img");
    const wrap    = document.getElementById("wrap");
    const dims    = document.getElementById("dims");
    const panel   = document.getElementById("info-panel");
    const ipDims  = document.getElementById("ip-dims");
    const ipZoom  = document.getElementById("ip-zoom");
    const ipFormat= document.getElementById("ip-format");

    // ── URL state: one URL per view mode ─────────────────────────────────────
    let compositeUrl = params.get("composite") || "";
    let imageUrl     = params.get("image")     || "";
    let maskUrl      = params.get("mask")      || "";
    let initMode     = params.get("mode")      || "image";

    let scale = 1, tx = 0, ty = 0, fitScale = 1;
    let panning = false, sx = 0, sy = 0, stx = 0, sty = 0;

    function apply() {
        img.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")";
        if (fitScale) ipZoom.textContent = "Zoom: " + Math.round((scale / fitScale) * 100) + "%";
        img.style.imageRendering = scale > 1.0 ? "pixelated" : "auto";
    }

    function fit() {
        var ww = wrap.clientWidth, wh = wrap.clientHeight;
        var nw = img.naturalWidth, nh = img.naturalHeight;
        if (!nw || !nh) return;
        fitScale = Math.min(ww / nw, wh / nh);
        scale = fitScale;
        tx = (ww - nw * fitScale) / 2;
        ty = (wh - nh * fitScale) / 2;
        apply();
        var label = nw + " \u00d7 " + nh + " px";
        ipDims.textContent = label;
        dims.textContent   = label;
    }

    window.fit = fit;
    window.addEventListener("resize", fit);

    // ── View modes ───────────────────────────────────────────────────────────
    const modeImg = document.getElementById("btn-mode-image");
    const modeMsk = document.getElementById("btn-mode-mask");
    const modeOvl = document.getElementById("btn-mode-overlay");
    const modes = ["image", "mask", "overlay"];
    let viewMode = "image";

    function applyMode() {
        var url = "";
        if (viewMode === "image")        url = imageUrl || compositeUrl;
        else if (viewMode === "mask")    url = maskUrl;
        else if (viewMode === "overlay") url = compositeUrl;

        // Fall back to image if the requested mode has no data.
        if (!url && viewMode !== "image") {
            viewMode = "image";
            url = imageUrl || compositeUrl;
        }

        if (url && url !== img.src) {
            img.style.opacity = "0.4";
            img.src = url;
        }

        // Button highlights.
        modeImg.classList.toggle("active", viewMode === "image");
        modeMsk.classList.toggle("active", viewMode === "mask");
        modeOvl.classList.toggle("active", viewMode === "overlay");

        // Dim unavailable modes.
        var hasMask = !!maskUrl;
        modeMsk.classList.toggle("dim", !hasMask);
        modeOvl.classList.toggle("dim", !hasMask);

        // Info panel format hint.
        ipFormat.textContent = viewMode === "mask" ? "Format: Grayscale"
                             : maskUrl ? "Format: RGB + Mask" : "Format: RGB";
    }

    function setViewMode(m) {
        viewMode = m;
        applyMode();
    }

    // Exposed so popup_preview.js can push new URLs live.
    window.setUrls = function(composite, image, mask) {
        compositeUrl = composite || "";
        imageUrl     = image     || "";
        maskUrl      = mask      || "";
        applyMode();
    };

    window.setViewMode = setViewMode;

    modeImg.addEventListener("click", function () { setViewMode("image"); });
    modeMsk.addEventListener("click", function () { setViewMode("mask"); });
    modeOvl.addEventListener("click", function () { setViewMode("overlay"); });

    // Info panel toggle
    document.getElementById("btn-info").addEventListener("click", function () {
        panel.classList.toggle("visible");
        this.classList.toggle("active", panel.classList.contains("visible"));
    });

    // Close button
    document.getElementById("btn-close").addEventListener("click", function () {
        window.close();
    });

    // Image load / error
    var initDone = false;
    img.addEventListener("load", function () {
        fit();
        img.style.opacity = "1";
        if (!initDone) {
            initDone = true;
            if (initMode !== "image") setViewMode(initMode);
        }
    });
    img.addEventListener("error", function () { img.style.opacity = "0.6"; });

    // Seed the initial view.
    applyMode();

    // Wheel → zoom centered on cursor
    wrap.addEventListener("wheel", function (e) {
        e.preventDefault();
        var rect = wrap.getBoundingClientRect();
        var cx = e.clientX - rect.left, cy = e.clientY - rect.top;
        var factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
        var ns = Math.max(fitScale * 0.1, Math.min(scale * factor, fitScale * 32));
        var r = ns / scale;
        tx = cx - (cx - tx) * r;
        ty = cy - (cy - ty) * r;
        scale = ns;
        apply();
    }, { passive: false });

    // Left-click drag → pan
    wrap.addEventListener("mousedown", function (e) {
        if (e.button !== 0) return;
        e.preventDefault();
        panning = true;
        sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
        document.body.classList.add("panning");
    });
    document.addEventListener("mousemove", function (e) {
        if (!panning) return;
        tx = stx + (e.clientX - sx);
        ty = sty + (e.clientY - sy);
        apply();
    });
    document.addEventListener("mouseup", function () {
        panning = false;
        document.body.classList.remove("panning");
    });

    function toggleZoom(cx, cy) {
        if (Math.abs(scale - 1.0) < 0.001) {
            fit();
        } else {
            var ns = 1.0;
            var r = ns / scale;
            tx = cx - (cx - tx) * r;
            ty = cy - (cy - ty) * r;
            scale = ns;
            apply();
        }
    }

    // Double-click → toggle fit/100%
    wrap.addEventListener("dblclick", function (e) {
        var rect = wrap.getBoundingClientRect();
        toggleZoom(e.clientX - rect.left, e.clientY - rect.top);
    });

    // Zoom buttons
    document.getElementById("btn-fit-zoom").addEventListener("click", fit);

    document.getElementById("btn-100").addEventListener("click", function () {
        if (Math.abs(scale - 1.0) < 0.001) return;
        var rect = wrap.getBoundingClientRect();
        var cx = rect.width / 2, cy = rect.height / 2;
        var ns = 1.0;
        var r = ns / scale;
        tx = cx - (cx - tx) * r;
        ty = cy - (cy - ty) * r;
        scale = ns;
        apply();
    });

    // ── Fit window to image ───────────────────────────────────────────────────
    document.getElementById("btn-adjust").addEventListener("click", function () {
        var nw = img.naturalWidth, nh = img.naturalHeight;
        if (!nw || !nh) return;
        var maxW = Math.round(screen.availWidth  * 0.9);
        var maxH = Math.round(screen.availHeight * 0.9);

        var dx = window.outerWidth - window.innerWidth;
        var dy = window.outerHeight - window.innerHeight;
        if (dx < 0 || isNaN(dx)) dx = 16;
        if (dy < 0 || isNaN(dy)) dy = 39;

        var curW = nw * scale;
        var curH = nh * scale;

        var w    = Math.max(320, Math.min(Math.round(curW + dx), maxW));
        var h    = Math.max(240, Math.min(Math.round(curH + dy), maxH));
        var left = Math.round((screen.availWidth  - w) / 2) + (screen.availLeft ?? 0);
        var top  = Math.round((screen.availHeight - h) / 2) + (screen.availTop  ?? 0);
        window.resizeTo(w, h);
        window.moveTo(left, top);
    });

    // Keyboard shortcuts
    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") window.close();
        if (e.key === "0" || e.key === "r") fit();
        if (e.key === "1") {
            var rect = wrap.getBoundingClientRect();
            toggleZoom(rect.width / 2, rect.height / 2);
        }
        if (e.key === "m" || e.key === "M") {
            var idx = modes.indexOf(viewMode);
            setViewMode(modes[(idx + 1) % modes.length]);
        }
    });
}());
</script>
</body>
</html>
